<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 120" width="100%" height="100%">
  <defs>
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb1de" />
      <stop offset="50%" stop-color="#a6e7ff" />
      <stop offset="100%" stop-color="#bfffa6" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10" />
      <stop offset="100%" stop-color="#12141f" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" />

  <!-- Top boundary glowing line -->
  <line x1="0" y1="0" x2="1000" y2="0" stroke="url(#cyber-grad)" stroke-width="3" filter="url(#glow)" />

  <!-- Logo/Brand on the left -->
  <g transform="translate(40, 68)">
    <circle cx="20" cy="-10" r="12" fill="none" stroke="#ffb1de" stroke-width="3" filter="url(#glow)" />
    <circle cx="35" cy="-10" r="8" fill="none" stroke="#a6e7ff" stroke-width="2" />
    <circle cx="45" cy="-10" r="5" fill="none" stroke="#bfffa6" stroke-width="1.5" />
    <text x="65" y="-4" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="900" fill="url(#cyber-grad)" letter-spacing="2">RAINBOWTECHNOLOGY</text>
  </g>

  <!-- Tech badges on the right -->
  <g transform="translate(560, 52)">
    <!-- Badge Python -->
    <rect x="0" y="0" width="75" height="26" rx="5" fill="#1b1e2a" stroke="#ffb1de" stroke-width="1" />
    <text x="37.5" y="17" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#ffb1de" text-anchor="middle">PYTHON</text>

    <!-- Badge SoapySDR -->
    <rect x="85" y="0" width="90" height="26" rx="5" fill="#1b1e2a" stroke="#a6e7ff" stroke-width="1" />
    <text x="130" y="17" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#a6e7ff" text-anchor="middle">SOAPYSDR</text>

    <!-- Badge Textual -->
    <rect x="185" y="0" width="85" height="26" rx="5" fill="#1b1e2a" stroke="#bfffa6" stroke-width="1" />
    <text x="227.5" y="17" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#bfffa6" text-anchor="middle">TEXTUAL</text>

    <!-- Badge DSP / FFT -->
    <rect x="280" y="0" width="90" height="26" rx="5" fill="#1b1e2a" stroke="#ffffff" stroke-width="0.5" opacity="0.8" />
    <text x="325" y="17" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.8">DSP • FFT</text>
  </g>

  <!-- Copyright / Status text -->
  <text x="960" y="100" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#ffffff" text-anchor="end" opacity="0.4">© 2026 RAINBOWTECHNOLOGY • High-Performance Terminal Software Defined Radio</text>
</svg>
