[device]
driver = "sdrplay"
sample_rate = 500000
center_freq = 97780487
gain = 40.0
auto_gain = false
ppm_correction = 0

[dsp]
fft_size = 2048
fft_overlap = 0.5
fft_avg_windows = 4
band_cache_cols = 1024
display_fps = 20
demod_mode = "wbfm"
audio_rate = 48000
wbfm_bandwidth = 180000
nbfm_bandwidth = 12500
am_bandwidth = 15000
fm_deemphasis_us = 50
fm_agc_enabled = true
volume = 75.0
squelch_db = -70.0
squelch_enabled = false
squelch_threshold = 5
squelch_hang_ms = 500

[display]
waterfall_history = 100
waterfall_history_buffer_ratio = 0.667
waterfall_auto_level = true
waterfall_level_low_pct = 5
waterfall_level_high_pct = 99
waterfall_min_range_db = 6.0
display_level_mode = "per_column"
column_floor_pct = 10
column_ceiling_pct = 99
column_ema_attack = 0.35
column_ema_release = 0.08
column_smooth_bins = 3
column_history_rows = 32
freq_span_mhz = 0.5
color_theme = "cyberpunk"

[app]
active_band_profile = ""

[recorder]
output_dir = ""
record_iq = true
record_audio = true
iq_format = "sigmf"
audio_format = "wav"
auto_record = false
trigger_db = -50.0

[ai]
whisper_enabled = false
whisper_model = "base"
whisper_language = "es"
classifier_enabled = false
classifier_model = "./ai/models/modulation_classifier.pkl"

[scanner]
enabled = false
freq_start = 88000000
freq_end = 108000000
freq_step = 200000
dwell_ms = 500
min_snr_db = 10.0
pause_on_signal = true
pause_resume_snr_db = 7.0
