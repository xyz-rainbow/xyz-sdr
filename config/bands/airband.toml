# Aviación VHF (118–137 MHz) — torre, aproximación, emergencia

[meta]
label = "Airband VHF (118–137 MHz)"
description = "NBFM 8.33/25 kHz, IQ estrecho para menor carga USB"

[device]
sample_rate = 250_000
center_freq = 121_500_000
gain = 45.0
auto_gain = false

[dsp]
demod_mode = "nbfm"
nbfm_bandwidth = 12_500
volume = 80.0
squelch_enabled = true
squelch_threshold = 10

[display]
freq_span_mhz = 0.25
display_level_mode = "per_column"
