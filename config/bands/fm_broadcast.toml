# Perfil FM broadcast (88–108 MHz) — emisoras comerciales WBFM

[meta]
label = "FM Broadcast (88–108 MHz)"
description = "WBFM estéreo, 2.048 MHz IQ, de-emphasis 50 µs (Europa)"

[device]
sample_rate = 2_048_000
center_freq = 97_780_487
gain = 40.0
auto_gain = false

[dsp]
demod_mode = "wbfm"
wbfm_bandwidth = 180_000
fm_deemphasis_us = 50
fm_agc_enabled = true
volume = 75.0

[display]
freq_span_mhz = 2.0
display_level_mode = "per_column"
waterfall_auto_level = true
