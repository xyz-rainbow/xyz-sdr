name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff check
        # Active once ruff config is settled. Disabled by default to avoid blocking existing PRs.
        run: |
          echo "::notice title=Lint disabled::Lint check is opt-in until ruff config is approved. Run 'ruff check .' locally."
          # Uncomment the next line once ruff config is approved and applied:
          # ruff check . --output-format=github

      - name: Run ruff format check
        run: |
          echo "::notice title=Format check disabled::Format check is opt-in until applied. Run 'ruff format --check .' locally."
          # Uncomment the next line once applied:
          # ruff format --check .